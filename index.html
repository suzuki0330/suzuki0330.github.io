<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鈴木未沙 - 新サイトへ移動しています</title>
  <!-- 3秒後に自動リダイレクト -->
  <meta http-equiv="refresh" content="3;url=https://suzuki0330.github.io/suzuki0330-floral/">
  <link rel="canonical" href="https://suzuki0330.github.io/suzuki0330-floral/">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: '游明朝', 'Yu Mincho', 'Noto Serif JP', serif;
      background: #fefcf6;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      color: #342c24;
    }
    .wrap {
      text-align: center;
      padding: 40px 24px;
    }
    .flower {
      font-size: 2.4rem;
      margin-bottom: 24px;
      animation: sway 3s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes sway {
      0%, 100% { transform: rotate(-5deg); }
      50% { transform: rotate(5deg); }
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 400;
      color: #4e7554;
      margin-bottom: 12px;
      letter-spacing: 0.1em;
    }
    p {
      font-size: 0.88rem;
      color: #675c52;
      line-height: 2;
      margin-bottom: 32px;
    }
    a {
      display: inline-block;
      background: #4e7554;
      color: white;
      text-decoration: none;
      padding: 14px 40px;
      border-radius: 40px;
      font-size: 0.88rem;
      letter-spacing: 0.1em;
      transition: background 0.3s;
    }
    a:hover { background: #6b9970; }
    .note {
      margin-top: 20px;
      font-size: 0.76rem;
      color: #9a8e84;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="flower">🌿</div>
    <h1>サイトを移転しました</h1>
    <p>鈴木未沙の公式サイトは新しいURLに移転しました。<br>3秒後に自動的に移動します。</p>
    <a href="https://suzuki0330.github.io/suzuki0330-floral/">新しいサイトへ →</a>
    <p class="note">自動で移動しない場合は上のボタンをクリックしてください。</p>
  </div>
</body>
</html>
